<nav class="workspace-nav" [attr.aria-label]="i18n.t('staffPage.workspaceAria')">
  @for (section of sections(); track section.id) {
    <a
      class="workspace-nav__card"
      [routerLink]="section.route"
      routerLinkActive="workspace-nav__card--active"
      [routerLinkActiveOptions]="{ exact: section.exact }"
    >
      <span class="workspace-nav__icon">
        <i [class]="'fas ' + section.icon"></i>
      </span>

      <span class="workspace-nav__body">
        <span class="workspace-nav__eyebrow">{{ section.eyebrow }}</span>
        <span class="workspace-nav__title">{{ section.title }}</span>
        <span class="workspace-nav__description">{{ section.description }}</span>
      </span>

      <span class="workspace-nav__action">
        {{ section.ctaLabel }}
        <i class="fas" [class.fa-arrow-right]="!i18n.isRtl()" [class.fa-arrow-left]="i18n.isRtl()"></i>
      </span>
    </a>
  }
</nav>
