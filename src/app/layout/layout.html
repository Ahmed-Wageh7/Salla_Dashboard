<div class="flex h-screen overflow-hidden bg-gray-50">
  <app-sidebar [isOpen]="sidebarOpen()" (closeMenu)="closeSidebar()"></app-sidebar>

  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    <app-header (menuToggle)="toggleSidebar()"></app-header>

    <main class="flex-1 overflow-y-auto">
      @if (isReadOnlyWorkspace()) {
        <div class="layout-banner">
          <strong>Read-only workspace.</strong>
          Your current role can browse data, but write actions are restricted.
        </div>
      }
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
