<div class="header-wrap">
  <!-- ── Main header bar ── -->
  <header class="header">
    <!-- Right group -->
    <div class="header__group header__group--right">
      <!-- Hamburger (mobile only) -->
      <button class="header__hamburger" (click)="menuToggle.emit()" aria-label="Toggle sidebar">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          width="20"
          height="20"
        >
          <line x1="3" y1="6" x2="21" y2="6" stroke-linecap="round" />
          <line x1="3" y1="12" x2="21" y2="12" stroke-linecap="round" />
          <line x1="3" y1="18" x2="21" y2="18" stroke-linecap="round" />
        </svg>
      </button>

      <!-- Brand (desktop — inside topbar) -->
      <div class="header__brand">
        <!-- <div class="header__brand-icon">
          <svg viewBox="0 0 32 32" fill="none" width="20" height="20">
            <path
              d="M7 9h12l-7 8h9"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle cx="22" cy="23" r="2.6" fill="white" />
          </svg>
        </div>
        <span class="header__brand-name">Salla</span> -->
      </div>

      <!-- Icon group -->
      <div class="header__icons">
        <!-- Balance chip -->
        <div class="header__balance" title="Wallet balance">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            width="15"
            height="15"
          >
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
            <line x1="1" y1="10" x2="23" y2="10" stroke-linecap="round" />
          </svg>
          <span class="header__balance-amount">{{ balance() }}</span>
          <span class="header__balance-currency">{{ balanceCurrency() }}</span>
        </div>

        <!-- Support / headset
        <button class="header__icon-btn header__icon-btn--desktop" aria-label="Support">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            width="20"
            height="20"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172
                 L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0
                 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
        </button> -->

        <!-- Language toggle -->
      </div>
    </div>

    <!-- Center: search -->
    <div class="header__search-wrap">
      <div class="header__search">
        <svg
          class="header__search-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          width="16"
          height="16"
        >
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" stroke-linecap="round" />
        </svg>
        <input
          type="search"
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          placeholder="Search..."
          class="header__search-input"
          aria-label="Search Salla"
        />
        <!-- <kbd class="header__search-kbd"></kbd> -->
      </div>
    </div>

    <!-- Left group -->
    <div class="header__group header__group--left">
      <button class="header__lang" aria-label="Switch language">AR</button>
      <!-- services call icon button -->
      <button class="header__icon-btn header__icon-btn--desktop" aria-label="Call Center">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          width="20"
          height="20"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M22 16.92v3a2 2 0 01-2.18 2
         19.86 19.86 0 01-8.63-3.07
         19.5 19.5 0 01-6-6
         19.86 19.86 0 01-3.07-8.63
         A2 2 0 014.11 2h3
         a2 2 0 012 1.72c.2 1.43.66 2.83 1.34 4.12a2 2 0 01-.45 2.11l-1.27 1.27a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c1.29.68 2.69 1.14 4.12 1.34a2 2 0 011.72 2z"
          />
        </svg>
      </button>

      <button class="header__icon-btn" aria-label="Notifications">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          width="28"
          height="28"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0
                 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0
                 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
          />
        </svg>
        @if (notifCount() > 0) {
          <span class="header__notif-dot">{{ notifCount() }}</span>
        }
      </button>

      <!-- User avatar -->
      <button class="header__avatar" aria-label="User menu" aria-haspopup="true">
        <img src="images1.png" alt="" />
      </button>

      <button class="header__logout" type="button" (click)="logout()">Logout</button>
    </div>
  </header>
</div>
